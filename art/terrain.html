<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>005 — Living Terrain</title>
</head>
<body>
<script src="noise.js"></script>
<script src="shell.js"></script>
<script>
shell({
  num: '005',
  title: 'Living Terrain',
  epigraph: 'the map that breathes',
  accent: 'rgba(200, 170, 68, 0.35)',
  controls: 'mouse — shift terrain focus<br>scroll — zoom level<br>1-4 — map styles<br>spacebar — new seed',
  prev: { href: 'waves.html', title: 'Interference Patterns' },
  next: { href: 'cosmic.html', title: 'Cosmic Web' },

  setup(canvas, ctx, W, H) {
    const SCALE = 4, WARP_SC = 3
    let sw, sh, offscreen, offCtx, imageData, data
    let warpW, warpH, warp1, warp2

    function allocBuffers() {
      sw = Math.floor(W / SCALE); sh = Math.floor(H / SCALE)
      if (!offscreen) {
        offscreen = document.createElement('canvas')
        offCtx = offscreen.getContext('2d')
      }
      offscreen.width = sw; offscreen.height = sh
      imageData = new ImageData(sw, sh)
      data = imageData.data
      warpW = Math.floor(sw / WARP_SC) + 2
      warpH = Math.floor(sh / WARP_SC) + 2
      warp1 = new Float32Array(warpW * warpH)
      warp2 = new Float32Array(warpW * warpH)
    }
    allocBuffers()

    let noise = new Noise(Math.random() * 65536)
    let time = 0, mouseX = 0, mouseY = 0, zoom = 1, style = 0

    canvas.addEventListener('mousemove', e => {
      mouseX = (e.clientX / W - 0.5) * 2; mouseY = (e.clientY / H - 0.5) * 2
    })
    canvas.addEventListener('wheel', e => {
      e.preventDefault(); zoom = Math.max(0.3, Math.min(4, zoom + e.deltaY * -0.001))
    }, { passive: false })
    window.addEventListener('keydown', e => {
      if (e.key === ' ') { e.preventDefault(); noise = new Noise(Math.random() * 65536); time = 0 }
      if (e.key >= '1' && e.key <= '4') style = parseInt(e.key) - 1
    })

    return {
      resize(nW, nH) { W = nW; H = nH; allocBuffers() },
      tick() {
        time += 0.003
        const d = data, n = noise, t = time, t07 = t * 0.7
        const offX = mouseX * 0.5, offY = mouseY * 0.5
        const invZ = 3 / zoom, invSw = 1 / sw, invSh = 1 / sh

        // warp grid at half render resolution
        for (let wy = 0; wy < warpH; wy++) {
          const py = wy * WARP_SC, ny = (py * invSh - 0.5) * invZ + offY
          const rOff = wy * warpW
          for (let wx = 0; wx < warpW; wx++) {
            const px = wx * WARP_SC, nx = (px * invSw - 0.5) * invZ + offX
            const idx = rOff + wx
            warp1[idx] = n.fbm3(nx + t, ny) * 0.3
            warp2[idx] = n.fbm3(nx, ny + t07) * 0.3
          }
        }

        // main render with bilinear warp interpolation
        const invWS = 1 / WARP_SC
        for (let py = 0; py < sh; py++) {
          const nyB = (py * invSh - 0.5) * invZ + offY
          const wyF = py * invWS, wy0 = wyF | 0, wyFrac = wyF - wy0
          const row0 = wy0 * warpW, row1 = (wy0 + 1) * warpW, rOff = py * sw

          for (let px = 0; px < sw; px++) {
            const nxB = (px * invSw - 0.5) * invZ + offX
            const wxF = px * invWS, wx0 = wxF | 0, wxFrac = wxF - wx0, wx1 = wx0 + 1

            const w1 = warp1[row0 + wx0] + (warp1[row0 + wx1] - warp1[row0 + wx0]) * wxFrac
              + (warp1[row1 + wx0] - warp1[row0 + wx0]) * wyFrac
              + (warp1[row0 + wx0] - warp1[row0 + wx1] - warp1[row1 + wx0] + warp1[row1 + wx1]) * wxFrac * wyFrac

            const w2 = warp2[row0 + wx0] + (warp2[row0 + wx1] - warp2[row0 + wx0]) * wxFrac
              + (warp2[row1 + wx0] - warp2[row0 + wx0]) * wyFrac
              + (warp2[row0 + wx0] - warp2[row0 + wx1] - warp2[row1 + wx0] + warp2[row1 + wx1]) * wxFrac * wyFrac

            const value = n.fbm3(nxB + w1, nyB + w2)
            const idx = (rOff + px) << 2

            if (style === 0) {
              const vm = ((value % 0.08) + 0.08) % 0.08
              const contour = vm > 0.04 ? 0.08 - vm : vm
              const vm5 = ((value % 0.4) + 0.4) % 0.4
              const major = vm5 > 0.2 ? 0.4 - vm5 : vm5
              if (major < 0.004) { d[idx]=180; d[idx+1]=220; d[idx+2]=255; d[idx+3]=204 }
              else if (contour < 0.003) { d[idx]=100; d[idx+1]=160; d[idx+2]=220; d[idx+3]=102 }
              else { const e = value * 0.5 + 0.5; d[idx]=e*30; d[idx+1]=e*50+10; d[idx+2]=e*80+20; d[idx+3]=38 }
            } else if (style === 1) {
              const tt = value * 0.5 + 0.5
              if (tt > 0.5) { d[idx]=255; d[idx+1]=(1-(tt-0.5)*2)*255; d[idx+2]=0 }
              else { d[idx]=tt*2*255; d[idx+1]=tt*2*200; d[idx+2]=tt<0.3?(0.3-tt)/0.3*200:0 }
              d[idx+3] = 230
            } else if (style === 2) {
              const vm = ((value % 0.06) + 0.06) % 0.06
              const contour = vm > 0.03 ? 0.06 - vm : vm
              const tt = value * 0.5 + 0.5
              if (contour < 0.004) { d[idx]=50+tt*200; d[idx+1]=255; d[idx+2]=100+tt*50; d[idx+3]=179 }
              else { d[idx]=tt*15; d[idx+1]=tt*30; d[idx+2]=tt*20; d[idx+3]=51 }
            } else {
              const vm = ((value % 0.07) + 0.07) % 0.07
              const contour = vm > 0.035 ? 0.07 - vm : vm
              const vm4 = ((value % 0.28) + 0.28) % 0.28
              const major = vm4 > 0.14 ? 0.28 - vm4 : vm4
              const tt = value * 0.5 + 0.5
              if (major < 0.004) { d[idx]=120; d[idx+1]=200; d[idx+2]=255; d[idx+3]=179 }
              else if (contour < 0.003) { d[idx]=60; d[idx+1]=140; d[idx+2]=200; d[idx+3]=89 }
              else if (tt > 0.55) { const l=(tt-0.55)*2.2222; d[idx]=40+l*100; d[idx+1]=80+l*60; d[idx+2]=30; d[idx+3]=77 }
              else { d[idx]=0; d[idx+1]=20+tt*60; d[idx+2]=60+tt*120; d[idx+3]=51 }
            }
          }
        }

        ctx.fillStyle = '#06060c'
        ctx.fillRect(0, 0, W, H)
        offCtx.putImageData(imageData, 0, 0)
        ctx.imageSmoothingEnabled = true
        ctx.imageSmoothingQuality = 'high'
        ctx.drawImage(offscreen, 0, 0, W, H)
      }
    }
  }
})
</script>
</body>
</html>
